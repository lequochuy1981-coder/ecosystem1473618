<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌿 Ecosystem Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green1: #00e676;
      --green2: #1b5e20;
      --teal:   #00bcd4;
      --yellow: #ffeb3b;
      --orange: #ff9800;
      --pink:   #e91e63;
      --purple: #9c27b0;
      --sky:    #29b6f6;
    }

    /* ====== BACKGROUND FOREST ====== */
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(180deg, #0d3b1e 0%, #145a32 30%, #1a7a3c 55%, #27ae60 75%, #1a5276 100%);
      position: relative;
    }

    /* Sky glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,230,118,0.18) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(41,182,246,0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ====== ANIMATED TREES ====== */
    .forest-bg {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 280px;
      pointer-events: none;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      padding: 0 10px;
    }
    .tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: bottom center;
      animation: sway 4s ease-in-out infinite;
    }
    .tree:nth-child(2n)   { animation-delay: -1s; }
    .tree:nth-child(3n)   { animation-delay: -2.5s; }
    .tree:nth-child(5n)   { animation-delay: -0.7s; }
    @keyframes sway {
      0%,100% { transform: rotate(-2deg); }
      50%      { transform: rotate(2deg); }
    }

    /* Water / River */
    .river {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 55px;
      background: linear-gradient(180deg, rgba(41,182,246,0.7), rgba(13,71,161,0.9));
      z-index: 2;
      overflow: hidden;
    }
    .river::before {
      content: '';
      position: absolute;
      top: 8px; left: -200%;
      width: 400%;
      height: 12px;
      background: repeating-linear-gradient(90deg,
        transparent 0px, rgba(255,255,255,0.25) 40px, transparent 80px);
      animation: ripple 3s linear infinite;
    }
    .river::after {
      content: '';
      position: absolute;
      top: 24px; left: -200%;
      width: 400%;
      height: 8px;
      background: repeating-linear-gradient(90deg,
        transparent 0px, rgba(255,255,255,0.15) 60px, transparent 120px);
      animation: ripple 5s linear infinite reverse;
    }
    @keyframes ripple {
      from { transform: translateX(0); }
      to   { transform: translateX(50%); }
    }

    /* Floating leaves */
    .leaf {
      position: fixed;
      font-size: 1.4rem;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 3;
      opacity: 0.8;
    }
    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(100vh)  rotate(360deg); opacity: 0; }
    }

    /* ====== RABBIT ANIMATION ====== */
    .rabbit-scene {
      position: fixed;
      bottom: 58px;
      left: 0;
      right: 0;
      height: 80px;
      pointer-events: none;
      z-index: 4;
      overflow: hidden;
    }

    .rabbit {
      position: absolute;
      bottom: 0;
      font-size: 2rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      transition: transform 0.1s;
    }

    .carrot {
      position: absolute;
      bottom: 4px;
      font-size: 1.8rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      transition: opacity 0.3s;
    }

    /* Rabbit hop animation */
    @keyframes hop {
      0%, 100%  { transform: translateY(0); }
      25%       { transform: translateY(-10px) scaleX(1.1); }
      50%       { transform: translateY(0); }
      75%       { transform: translateY(-6px); }
    }

    @keyframes eat-bob {
      0%, 100%  { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-4px) rotate(5deg); }
    }

    /* ====== MAIN CONTENT ====== */
    .container {
      position: relative;
      z-index: 10;
      max-width: 980px;
      margin: 0 auto;
      padding: 30px 20px 160px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(0,230,118,0.8), 0 2px 8px rgba(0,0,0,0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: glow 2.5s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 15px #00e676, 0 2px 8px rgba(0,0,0,.5); }
      to   { text-shadow: 0 0 35px #69f0ae, 0 0 60px #00bcd4, 0 2px 8px rgba(0,0,0,.5); }
    }
    header p {
      margin-top: 8px;
      color: #b9f6ca;
      font-size: 1.05rem;
      font-weight: 700;
    }

    /* Score bar */
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-bottom: 28px;
    }
    .score-chip {
      padding: 8px 22px;
      border-radius: 30px;
      font-weight: 800;
      font-size: 1rem;
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.25);
    }
    .score-chip.correct  { background: rgba(0,230,118,0.25); color: #69f0ae; border-color: #00e676; }
    .score-chip.wrong    { background: rgba(244,67,54,0.25);  color: #ff8a80; border-color: #f44336; }
    .score-chip.progress { background: rgba(41,182,246,0.2);  color: #80d8ff; border-color: #29b6f6; }

    /* ====== GRID - 2 ROWS × 5 COLS ====== */
    .grid-wrapper {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .grid-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* Horizontal connector line behind the row */
    .grid-row::before {
      content: '';
      position: absolute;
      top: 50%;
      left: calc(77px + 10px);
      right: calc(77px + 10px);
      height: 4px;
      background: linear-gradient(90deg, #00e676, #00bcd4, #00e676);
      border-radius: 2px;
      transform: translateY(-50%);
      z-index: 0;
      box-shadow: 0 0 12px rgba(0,230,118,0.6);
    }

    .card-wrap {
      position: relative;
      z-index: 1;
      padding: 0 10px;
    }

    .card {
      width: 145px;
      height: 155px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
      border: 3px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      transition: transform 0.25s, box-shadow 0.25s;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.06);
      border-radius: 22px;
      transition: background 0.3s;
    }
    .card:hover { transform: translateY(-8px) scale(1.04); }
    .card:hover::before { background: rgba(255,255,255,0.14); }

    .card .icon  { font-size: 2.8rem; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
    .card .label {
      font-size: 0.72rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1.3;
      padding: 0 6px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* Card state badges */
    .card .badge {
      position: absolute;
      top: 8px; right: 8px;
      width: 24px; height: 24px;
      border-radius: 50%;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
    }
    .card.answered-correct .badge { background: #00e676; }
    .card.answered-wrong   .badge { background: #f44336; }
    .card.locked { opacity: 0.5; cursor: default; }
    .card.locked:hover { transform: none; }

    /* Card colors */
    .c0  { background: linear-gradient(135deg,#ff6f00,#ff8f00); box-shadow: 0 8px 28px rgba(255,111,0,.5); }
    .c1  { background: linear-gradient(135deg,#e91e63,#ad1457); box-shadow: 0 8px 28px rgba(233,30,99,.5); }
    .c2  { background: linear-gradient(135deg,#00897b,#00695c); box-shadow: 0 8px 28px rgba(0,137,123,.5); }
    .c3  { background: linear-gradient(135deg,#7b1fa2,#6a1b9a); box-shadow: 0 8px 28px rgba(123,31,162,.5); }
    .c4  { background: linear-gradient(135deg,#0288d1,#01579b); box-shadow: 0 8px 28px rgba(2,136,209,.5); }
    .c5  { background: linear-gradient(135deg,#f57f17,#e65100); box-shadow: 0 8px 28px rgba(245,127,23,.5); }
    .c6  { background: linear-gradient(135deg,#c0392b,#922b21); box-shadow: 0 8px 28px rgba(192,57,43,.5); }
    .c7  { background: linear-gradient(135deg,#1565c0,#0d47a1); box-shadow: 0 8px 28px rgba(21,101,192,.5); }
    .c8  { background: linear-gradient(135deg,#558b2f,#33691e); box-shadow: 0 8px 28px rgba(85,139,47,.5); }
    .c9  { background: linear-gradient(135deg,#6d4c41,#4e342e); box-shadow: 0 8px 28px rgba(109,76,65,.5); }

    /* ====== MODAL ====== */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: linear-gradient(145deg,#0a2e1a,#0d3b2e);
      border: 2px solid rgba(0,230,118,0.4);
      border-radius: 28px;
      padding: 36px 32px 28px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,230,118,0.15);
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .modal-icon { font-size: 2.6rem; }
    .modal-timer {
      margin-left: auto;
      font-size: 1.1rem;
      font-weight: 800;
      color: #ffeb3b;
      background: rgba(255,235,59,0.15);
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid rgba(255,235,59,0.5);
      display: none;
      box-shadow: 0 0 10px rgba(255,235,59,0.2);
    }
    .modal-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: #69f0ae;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .question-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.6;
      margin-bottom: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      border-left: 4px solid #00e676;
    }

    /* Answer buttons */
    .answers {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .answer-btn {
      padding: 14px 18px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .answer-btn:hover:not(:disabled) {
      background: rgba(0,230,118,0.2);
      border-color: #00e676;
      transform: translateX(4px);
    }
    .answer-btn .letter {
      min-width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
      font-size: 0.9rem;
    }
    .answer-btn.correct {
      background: rgba(0,230,118,0.3);
      border-color: #00e676;
      animation: pulse-green 0.5s;
    }
    .answer-btn.correct .letter { background: #00e676; color: #000; }
    .answer-btn.wrong {
      background: rgba(244,67,54,0.3);
      border-color: #f44336;
    }
    .answer-btn.wrong .letter { background: #f44336; }

    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 rgba(0,230,118,0); }
      50%      { box-shadow: 0 0 20px rgba(0,230,118,0.6); }
    }

    .feedback {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 1rem;
      text-align: center;
      display: none;
    }
    .feedback.correct-msg {
      background: rgba(0,230,118,0.2);
      color: #00e676;
      border: 1px solid #00e676;
      display: block;
    }
    .feedback.wrong-msg {
      background: rgba(244,67,54,0.2);
      color: #ff8a80;
      border: 1px solid #f44336;
      display: block;
    }

    .modal-footer {
      margin-top: 22px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .btn-close {
      padding: 11px 28px;
      border-radius: 30px;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-close:hover { background: rgba(255,255,255,0.2); }

    /* Placeholder modal */
    .placeholder-modal {
      text-align: center;
      padding: 20px 0;
    }
    .placeholder-modal .ph-icon { font-size: 4rem; margin-bottom: 12px; }
    .placeholder-modal p {
      color: #b9f6ca;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.6;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 200;
      animation: confettiDrop 1.2s ease-in forwards;
    }
    @keyframes confettiDrop {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Responsive */
    @media(max-width: 820px) {
      .grid-row { flex-wrap: wrap; justify-content: center; gap: 12px; }
      .grid-row::before { display: none; }
      .card-wrap { padding: 0 4px; }
      .card { width: 130px; height: 140px; }
    }
    @media(max-width: 520px) {
      .card { width: 110px; height: 120px; }
      .card .icon { font-size: 2.2rem; }
      .modal { padding: 24px 18px 20px; }
    }
  </style>
</head>
<body>

<!-- Floating leaves -->
<script>
  const leafEmojis = ['🍃','🌿','🍂','🌱','🍀'];
  for(let i=0;i<18;i++){
    const l = document.createElement('div');
    l.className = 'leaf';
    l.textContent = leafEmojis[Math.floor(Math.random()*leafEmojis.length)];
    l.style.left = Math.random()*100+'vw';
    l.style.animationDuration = (5+Math.random()*10)+'s';
    l.style.animationDelay  = (Math.random()*12)+'s';
    l.style.fontSize = (0.9+Math.random()*1.2)+'rem';
    document.body.appendChild(l);
  }
</script>

<!-- Forest background trees -->
<div class="forest-bg" id="forestBg"></div>

<!-- Rabbit scene -->
<div class="rabbit-scene" id="rabbitScene">
  <div class="rabbit" id="rabbit">🐇</div>
  <div class="carrot" id="carrot">🥕</div>
</div>

<!-- River -->
<div class="river"></div>

<!-- Main -->
<div class="container">
  <header>
    <h1>🌿 Ecosystem 🌿</h1>
    <p>Nhấn vào ô để thử thách kiến thức của bạn!</p>
  </header>

  <div class="score-bar">
    <div class="score-chip progress">📋 Câu hỏi: <span id="totalAnswered">0</span>/10</div>
    <div class="score-chip correct">✅ Đúng: <span id="correctCount">0</span></div>
    <div class="score-chip wrong">❌ Sai: <span id="wrongCount">0</span></div>
  </div>

  <div class="grid-wrapper" id="gridWrapper"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-icon" id="modalIcon"></span>
      <span class="modal-title" id="modalTitle"></span>
      <span class="modal-timer" id="modalTimer"></span>
    </div>
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-close" id="btnClose">Đóng lại</button>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
const cards = [
  // Row 1
  {
    icon:'🦁', label:'Động vật hoang dã', colorClass:'c0',
    question:'The _______ of the tropical rainforest is being threatened by illegal logging.',
    answers:['biologist','biology','biodiversity','biological'],
    correct: 2
  },
  {
    icon:'🌺', label:'Thực vật nhiệt đới', colorClass:'c1',
    question:'Choose the word with a different stress pattern from the others:',
    answers:['Ecosystem','Conservation','Wildlife','Habitat'],
    correct: 1
  },
  {
    icon:'🦠', label:'Vi khuẩn & Vi sinh', colorClass:'c2',
    question:'She works as an ______.',
    answers:['traffic air controller','air traffic controller','controller air traffic','air controller traffic'],
    correct: 1
  },
  {
    icon:'🐸', label:'Lưỡng cư rừng', colorClass:'c3',
    question:'We need to protect ______.',
    answers:['wild life','life wild','wildlife','wild-life animals'],
    correct: 2
  },
  {
    icon:'🦋', label:'Côn trùng rừng', colorClass:'c4',
    question:'If we _______ more trees, the air would be cleaner.',
    answers:['planted','plant','have planted','will plant'],
    correct: 0
  },
  // Row 2
  {
    icon:'🌳', label:'Cây gỗ lớn', colorClass:'c5',
    question:'The establishment of national parks helps _______ the flora and fauna of a region.',
    answers:['preserve','ignore','harm','remove'],
    correct: 0
  },
  {
    icon:'🐠', label:'Cá suối rừng', colorClass:'c6',
    question:'A _______ is a group of plants and animals that live together in a particular area.',
    answers:['pollution','extinction','individual','community'],
    correct: 3
  },
  {
    icon:'🦅', label:'Chim rừng', colorClass:'c7',
    question:'Which word refers to the natural environment in which a particular species of animal or plant lives?',
    answers:['Conservation','Habitat','Biodiversity','Ecosystem'],
    correct: 1
  },
  {
    icon:'🍄', label:'Nấm & Địa y', colorClass:'c8',
    question:'I bought a new ______ yesterday.',
    answers:['machine washing','washing machine','wash machine','machine for washing'],
    correct: 1
  },
  {
    icon:'🐺', label:'Thú ăn thịt', colorClass:'c9',
    question:'Many species are at risk of extinction _______ climate change.',
    answers:['instead of','due to','because','despite'],
    correct: 1
  },
  {
    icon:'🌟', label:'Khám phá', colorClass:'c0',
    question:'the childern are playing in a____.',
    answers:['cars park','park car','car parks','car park'],
    correct: 3
  }
];

// ===================== STATE =====================
const state = { correct: 0, wrong: 0, answered: {} };

// ===================== BUILD TREES =====================
(function buildTrees(){
  const fb = document.getElementById('forestBg');
  const colors = ['#1b5e20','#2e7d32','#388e3c','#1a6b2a','#145a32','#0a4020'];
  for(let i=0;i<14;i++){
    const h = 120+Math.random()*130;
    const w = 60+Math.random()*60;
    const col = colors[Math.floor(Math.random()*colors.length)];
    const trunkH = 30+Math.random()*30;
    const trunkW = 10+Math.random()*10;
    const t = document.createElement('div');
    t.className='tree';
    t.style.marginBottom = '54px';
    t.innerHTML=`
      <div style="width:0;height:0;border-left:${w*.55}px solid transparent;border-right:${w*.55}px solid transparent;border-bottom:${h*.38}px solid ${col};filter:brightness(1.3);margin-bottom:-6px"></div>
      <div style="width:0;height:0;border-left:${w*.7}px solid transparent;border-right:${w*.7}px solid transparent;border-bottom:${h*.42}px solid ${col};margin-bottom:-6px"></div>
      <div style="width:0;height:0;border-left:${w*.9}px solid transparent;border-right:${w*.9}px solid transparent;border-bottom:${h*.48}px solid ${col};filter:brightness(0.8)"></div>
      <div style="width:${trunkW}px;height:${trunkH}px;background:#5d4037;border-radius:4px"></div>
    `;
    fb.appendChild(t);
  }
})();

// ===================== BUILD GRID (2 rows × 5) =====================
const gridWrapper = document.getElementById('gridWrapper');
const row1 = document.createElement('div');
row1.className = 'grid-row';
const row2 = document.createElement('div');
row2.className = 'grid-row';

cards.forEach((c,i) => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';

  const div = document.createElement('div');
  div.className = `card ${c.colorClass}`;
  div.id = `card-${i}`;
  div.innerHTML = `
    <span class="icon">${c.icon}</span>
    <span class="label">${c.label}</span>
    <span class="badge" id="badge-${i}"></span>
  `;
  div.addEventListener('click', () => openCard(i));
  wrap.appendChild(div);

  if(i < 5) row1.appendChild(wrap);
  else row2.appendChild(wrap);
});

gridWrapper.appendChild(row1);
gridWrapper.appendChild(row2);

// ===================== MODAL LOGIC =====================
const overlay   = document.getElementById('overlay');
const modalIcon = document.getElementById('modalIcon');
const modalTitle= document.getElementById('modalTitle');
const modalTimer= document.getElementById('modalTimer');
const modalBody = document.getElementById('modalBody');
const btnClose  = document.getElementById('btnClose');

let countdownInterval = null;

btnClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });

function openCard(i){
  const c = cards[i];
  modalIcon.textContent  = c.icon;
  modalTitle.textContent = c.label;

  if (countdownInterval) clearInterval(countdownInterval);
  modalTimer.style.display = 'none';

  if(c.placeholder){
    modalBody.innerHTML = `
      <div class="placeholder-modal">
        <div class="ph-icon">🔒</div>
        <p>Câu hỏi sắp được cập nhật!<br>Hãy đợi chủ đề này nhé 🌿</p>
      </div>`;
  } else {
    const answered = state.answered[i] !== undefined;
    const letters  = ['A','B','C','D'];
    const answersHTML = c.answers.map((a,idx) => {
      let cls = '';
      if(answered){
        if(idx === c.correct) cls = 'correct';
        else if(idx === state.answered[i] && state.answered[i] !== c.correct) cls = 'wrong';
      }
      return `
        <button class="answer-btn ${cls}" id="ans-${idx}" ${answered?'disabled':''} onclick="selectAnswer(${i},${idx})">
          <span class="letter">${letters[idx]}</span>${a}
        </button>`;
    }).join('');

    let feedbackHTML = '';
    if(answered){
      const isCorrect = state.answered[i] === c.correct;
      feedbackHTML = `<div class="feedback ${isCorrect?'correct-msg':'wrong-msg'}">
        ${isCorrect ? '🎉 Chính xác! Xuất sắc lắm!' : `❌ Sai rồi! Đáp án đúng là: <strong>${c.answers[c.correct]}</strong>`}
      </div>`;
    }

    modalBody.innerHTML = `
      <div class="question-text">${c.question}</div>
      <div class="answers">${answersHTML}</div>
      ${feedbackHTML}`;

    if (!answered) {
      modalTimer.style.display = 'block';
      modalTimer.textContent = '⏳ 10s';
      let timeLeft = 10;
      countdownInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          timeLeft = 0;
          clearInterval(countdownInterval);
        }
        modalTimer.textContent = `⏳ ${timeLeft}s`;
      }, 1000);
    }
  }

  overlay.classList.add('open');
}

function selectAnswer(cardIdx, ansIdx){
  if(state.answered[cardIdx] !== undefined) return;
  state.answered[cardIdx] = ansIdx;
  
  if (countdownInterval) clearInterval(countdownInterval);

  const c = cards[cardIdx];
  const isCorrect = ansIdx === c.correct;

  if(isCorrect){ state.correct++; } else { state.wrong++; }
  updateScoreBar();

  ['A','B','C','D'].forEach((_,i) => {
    const btn = document.getElementById(`ans-${i}`);
    if(!btn) return;
    btn.disabled = true;
    if(i === c.correct) btn.classList.add('correct');
    else if(i === ansIdx && !isCorrect) btn.classList.add('wrong');
  });

  let fb = document.createElement('div');
  fb.className = `feedback ${isCorrect?'correct-msg':'wrong-msg'}`;
  fb.innerHTML = isCorrect
    ? '🎉 Chính xác! Xuất sắc lắm!'
    : `❌ Sai rồi! Đáp án đúng là: <strong>${c.answers[c.correct]}</strong>`;
  document.querySelector('.answers').after(fb);

  const badge = document.getElementById(`badge-${cardIdx}`);
  if(badge){
    badge.textContent = isCorrect ? '✓' : '✗';
    badge.style.background = isCorrect ? '#00e676' : '#f44336';
    badge.style.color = '#000';
  }
  const card = document.getElementById(`card-${cardIdx}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  if(isCorrect) launchConfetti();
}

function closeModal(){ 
  overlay.classList.remove('open'); 
  if (countdownInterval) clearInterval(countdownInterval);
}

function updateScoreBar(){
  document.getElementById('totalAnswered').textContent = Object.keys(state.answered).length;
  document.getElementById('correctCount').textContent  = state.correct;
  document.getElementById('wrongCount').textContent    = state.wrong;
}

// ===================== CONFETTI =====================
function launchConfetti(){
  const colors = ['#00e676','#ffeb3b','#ff4081','#29b6f6','#ff9800','#ea80fc'];
  for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left  = Math.random()*100+'vw';
    p.style.top   = '40vh';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.width  = (6+Math.random()*10)+'px';
    p.style.height = (6+Math.random()*10)+'px';
    p.style.animationDuration = (0.8+Math.random()*0.8)+'s';
    p.style.animationDelay   = (Math.random()*0.4)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 2000);
  }
}

// ===================== RABBIT ANIMATION =====================
(function initRabbit(){
  const rabbitEl = document.getElementById('rabbit');
  const carrotEl = document.getElementById('carrot');
  const scene    = document.getElementById('rabbitScene');

  // Carrot position: 78% of viewport width
  const carrotPct = 0.78;

  // Phases (all ms — slower: 3× speed reduction):
  const RUN_FORWARD  = 9000;   // run left→right
  const GRAB_TIME    = 600;    // grab carrot
  const RUN_BACK     = 9000;   // run right→left
  const EAT_TIME     = 5000;   // eat at home

  const startX = -60; // off-screen left

  function getCarrotX(){
    return Math.floor(window.innerWidth * carrotPct);
  }

  // Set rabbit position + direction: facingLeft=true → scaleX(-1), false → scaleX(1)
  // hopY is extra vertical offset for hopping
  function setRabbitTransform(x, facingLeft, hopY){
    rabbitEl.style.left = x + 'px';
    const sx = facingLeft ? 1 : -1;  // emoji 🐇 faces left by default, flip when going right
    rabbitEl.style.transform = `scaleX(${sx}) translateY(${hopY}px)`;
    rabbitEl.style.animation = 'none';
  }

  function setCarrotVisible(v){
    carrotEl.style.opacity = v ? '1' : '0';
    carrotEl.style.transform = v ? 'scale(1)' : 'scale(0)';
  }

  function placeCarrot(){
    carrotEl.style.left = getCarrotX() + 'px';
    setCarrotVisible(true);
  }

  // Smooth movement with hop — facingLeft controls mirror direction
  function runBetween(fromX, toX, duration, facingLeft, onDone){
    const start = performance.now();
    function frame(now){
      const t = Math.min((now - start) / duration, 1);
      const x = fromX + (toX - fromX) * t;
      // Hop: bounce using sine wave, 6 hops per trip
      const hopY = -Math.abs(Math.sin(t * Math.PI * 6)) * 14;
      setRabbitTransform(x, facingLeft, hopY);
      if(t < 1){
        requestAnimationFrame(frame);
      } else {
        setRabbitTransform(x, facingLeft, 0);
        if(onDone) onDone();
      }
    }
    requestAnimationFrame(frame);
  }

  function runCycle(){
    placeCarrot();
    const cx = getCarrotX();

    // Phase 1: run RIGHT → face right (facingLeft=false)
    runBetween(startX, cx, RUN_FORWARD, false, () => {
      // Phase 2: pause & grab carrot
      setTimeout(() => {
        setCarrotVisible(false);
        // Phase 3: run LEFT → face left (facingLeft=true)
        runBetween(cx, startX, RUN_BACK, true, () => {
          // Phase 4: eating at home — face right (flip emoji since it faces left by default)
          rabbitEl.style.left = startX + 'px';
          rabbitEl.style.transform = 'scaleX(-1)';
          rabbitEl.style.animation = 'eat-bob 0.4s ease-in-out infinite';
          setTimeout(() => {
            rabbitEl.style.animation = 'none';
            runCycle();
          }, EAT_TIME);
        });
      }, GRAB_TIME);
    });
  }

  window.addEventListener('load', () => {
    placeCarrot();
    setTimeout(runCycle, 800);
  });
})();
</script>
